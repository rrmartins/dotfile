window.opacity = 1.0

[font]
size = 12

[font.normal]
family = "MesloLGM Nerd Font Mono"
style = "Regular"

[font.bold]
family = "MesloLGM Nerd Font Mono"
style = "Bold"

[font.italic]
family = "MesloLGM Nerd Font Mono"
style = "Regular"

[font.bold_italic]
family = "MesloLGM Nerd Font Mono"
style = "Bold"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"

[general]
live_config_reload = true
# Keep colors in the imported theme file so Dracula is the active palette.
import = ["~/.config/alacritty/themes/dracula.toml"]

[env]
TERM = "xterm-256color"

[terminal]

[terminal.shell]
program = "/bin/zsh"

[window.padding]
x = 2
y = 3
